<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="文案库">
<title>Nova 文案库</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC','Hiragino Sans GB',sans-serif;background:#f5f4f0;color:#1a1a1a;font-size:15px;min-height:100vh}

.header{position:sticky;top:0;z-index:100;background:rgba(245,244,240,0.96);backdrop-filter:blur(12px);padding:14px 16px 10px;border-bottom:0.5px solid #e0e0d8}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.header-title{font-size:18px;font-weight:600;letter-spacing:0.02em}
.add-btn-top{padding:7px 18px;border-radius:20px;background:#1a1a1a;color:#f5f4f0;border:none;font-size:13px;cursor:pointer;font-family:inherit}

.mode-toggle{display:flex;gap:6px;margin-bottom:10px}
.mode-btn{flex:1;padding:9px;border-radius:10px;border:0.5px solid #ccc;background:#ebebeb;color:#666;font-size:14px;cursor:pointer;font-family:inherit;transition:all 0.15s}
.mode-btn.on{background:#fff;color:#1a1a1a;font-weight:500;border-color:#bbb;box-shadow:0 1px 4px rgba(0,0,0,0.08)}

.tags-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.tags-row::-webkit-scrollbar{display:none}
.tag-chip{padding:5px 14px;border-radius:20px;border:0.5px solid #d0d0d0;background:#ebebeb;color:#666;font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all 0.15s}
.tag-chip.on{background:#1a1a1a;color:#f5f4f0;border-color:transparent}

.main{padding:14px 16px 100px}
.count-label{font-size:12px;color:#999;margin-bottom:12px;letter-spacing:0.03em}

.card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;border:0.5px solid #e8e8e8}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.card-meta{flex:1;min-width:0}
.card-tag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;background:#f0efeb;color:#888}
.card-title{font-size:15px;font-weight:500;margin:6px 0 0;color:#1a1a1a;line-height:1.4}
.copy-btn{margin-left:12px;flex-shrink:0;padding:7px 16px;border-radius:10px;border:0.5px solid #ccc;background:transparent;color:#555;font-size:13px;cursor:pointer;font-family:inherit;transition:all 0.15s}
.copy-btn.copied{color:#2d7a4f;border-color:#2d7a4f;background:#edf7f1}
.card-content{font-size:14px;color:#444;line-height:1.8;white-space:pre-wrap;word-break:break-word}
.expand-btn{background:none;border:none;padding:0;font-size:12px;color:#999;cursor:pointer;text-decoration:underline;margin-top:8px;display:block;font-family:inherit}
.card-actions{display:flex;gap:12px;margin-top:10px;padding-top:10px;border-top:0.5px solid #f0f0ee}
.action-btn{background:none;border:none;padding:0;font-size:12px;color:#aaa;cursor:pointer;font-family:inherit}
.action-btn.del{color:#e06060}

.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:200}
.overlay.open{display:block}
.sheet{position:absolute;bottom:0;left:0;right:0;background:#f5f4f0;border-radius:20px 20px 0 0;padding:20px 16px 44px;max-height:92vh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;background:#ccc;border-radius:2px;margin:0 auto 16px}
.sheet h3{font-size:16px;font-weight:600;margin-bottom:16px;text-align:center;color:#1a1a1a}
.field-label{font-size:13px;color:#666;margin:0 0 6px;display:block}
input[type=text],select,textarea{width:100%;padding:10px 12px;border-radius:10px;border:0.5px solid #ccc;background:#fff;color:#1a1a1a;font-size:14px;font-family:inherit;outline:none;-webkit-appearance:none;margin-bottom:14px}
input[type=text]:focus,textarea:focus{border-color:#999}
textarea{resize:vertical;line-height:1.6}
.sheet-actions{display:flex;gap:8px;margin-top:4px}
.save-btn{flex:1;padding:13px;border-radius:12px;border:none;background:#1a1a1a;color:#fff;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit}
.cancel-btn{padding:13px 20px;border-radius:12px;border:0.5px solid #ccc;background:transparent;color:#666;font-size:15px;cursor:pointer;font-family:inherit}

.loading{text-align:center;padding:60px 16px;color:#aaa;font-size:14px}
.loading-spinner{width:24px;height:24px;border:2px solid #e0e0d8;border-top-color:#888;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 16px;color:#bbb;font-size:14px;line-height:1.8}
.error-msg{background:#fff0f0;border:0.5px solid #fcc;border-radius:10px;padding:12px 16px;font-size:13px;color:#c00;margin-bottom:12px}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="header-title">文案库</span>
    <button class="add-btn-top" onclick="openSheet()">+ 添加</button>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn on" id="mpyq" onclick="setMode('pyq')">朋友圈</button>
    <button class="mode-btn" id="mxhs" onclick="setMode('xhs')">小红书图文</button>
  </div>
  <div class="tags-row" id="tagsRow"></div>
</div>

<div class="main">
  <div class="count-label" id="countLabel"></div>
  <div id="errorBox"></div>
  <div id="cardsContainer">
    <div class="loading">
      <div class="loading-spinner"></div>
      加载中...
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="handleOverlay(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <h3 id="sheetTitle">添加文案</h3>
    <input type="hidden" id="editId">
    <span class="field-label">标题</span>
    <input type="text" id="inTitle" placeholder="文案主题，例如：关于坚持的感悟">
    <span class="field-label">分类</span>
    <select id="inTag">
      <option>人设IP</option><option>内容创作</option><option>变现思维</option>
      <option>心理哲学</option><option>自媒体趋势</option><option>其他</option>
    </select>
    <span class="field-label">朋友圈版本</span>
    <textarea id="inPyq" rows="6" placeholder="粘贴朋友圈文案...&#10;可以来自飞书文档、备忘录、书摘、视频转录，任何来源直接粘贴"></textarea>
    <span class="field-label">小红书版本（可选）</span>
    <textarea id="inXhs" rows="5" placeholder="粘贴小红书版本，含【标题】和 #话题标签...&#10;留空则自动使用朋友圈版本"></textarea>
    <div class="sheet-actions">
      <button class="save-btn" onclick="saveEntry()">保存</button>
      <button class="cancel-btn" onclick="closeSheet()">取消</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://nzwdxltcjdymbubqvqkt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_77PtQQH40uV-slncMYC0ng_-63oW11l';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TAGS = ['全部','人设IP','内容创作','变现思维','心理哲学','自媒体趋势','其他'];

const SEED = [
  {title:'对内 vs 对外表达',tag:'人设IP',
   pyq:'不存在没有表达欲的人。对外表达不多的人，一定对内表达很多——因为人的思考与情绪总要有出口。\n\n我就是对内表达很多的人，不然我不会同时有甲状腺结节、乳腺结节、子宫肌瘤。那是很多想法、起伏的情绪，没有消解，没有释放的结果。\n\n对外表达多的人天然适合演讲、做直播；对内表达多的人更适合做IP——IP更看重的是作品，而不只是销售。习惯内化的人同理心通常更强，会在意每一条内容对别人有没有真实的价值。\n\n你是哪种人？',
   xhs:'【你身上的结节，可能是你没说出口的话】\n\n你有没有发现——越不爱开口的人，身体往往越容易出问题？\n\n我自己就是例子。甲状腺结节、乳腺结节、子宫肌瘤，三个同时在。那些没有说出口的想法，压着的情绪，说不出去的，就往身体里走。\n\n但这不是叫你强迫自己外向。\n\n对外表达多的人天然适合直播、演讲；对内表达多的人其实更适合做IP——IP更看重的是作品，而不是即兴表演。我们同理心更强，更在意每一条内容对别人有没有真实的价值。\n\n如果你一直觉得自己「不适合做内容」，可能只是选错了形式。\n\n你是对内表达型，还是对外表达型？\n\n#内容创作 #个人IP #自媒体 #身心健康 #女性成长'},
  {title:'做自媒体的两个线头',tag:'内容创作',
   pyq:'做自媒体只有两个线头，没有第三个。\n\n一头是从感情开始。大部分人最初做内容，是因为心里有太多东西需要抒发，像一块吸饱了水的海绵，创作就是让它慢慢流淌出来。但经验总会被释放干净，如果内容不能带来乐趣，就不要写——因为此外得不到任何别的回报。\n\n另一头是莫得感情。这类人我不叫创作者，叫生意人。他们做内容从利益出发，有跑通的变现项目，内容是工具、是手段、是发出去的传单。但纯理性脑，做不好内容。\n\n两类人各有优势和缺陷。所以人类有个伟大的发现——原来人和人之间可以分工协作。感性的人做内容，理性的人做变现。\n\n你是哪种？',
   xhs:'【做自媒体失败？因为你连自己是哪种人都不知道】\n\n做自媒体只有两种人能做成，你必须是其中一种。\n\n第一种：从感情出发。心里有太多东西想说，创作就是把它慢慢流淌出来。动力天然充足，但有一个致命问题——经验总会被说完，说完了怎么办？\n\n第二种：莫得感情的生意人。从利益出发，有跑通的变现项目，内容是工具是传单。问题是：纯理性脑，做不好内容。\n\n两种人各有死穴，所以人类发现了一个伟大的解法——分工协作。感性的人做内容，理性的人做变现。\n\n你属于哪种？搞清楚这个，比学一百个涨粉技巧都重要。\n\n#自媒体 #内容创作 #个人IP #变现 #涨粉'},
  {title:'先写出观众的苦恼',tag:'内容创作',
   pyq:'同样是知识分享博主，为什么点赞收藏能差几千倍？很可能是因为你文案的前几句没有写出观众的苦恼。\n\n「今天教大家如何冥想」，只抓住了想知道怎么冥想的人；「每天冥想3分钟，我逆生长了10岁」，则抓住了所有人。\n\n分享心理学，不要写「三招摆脱情绪内耗」，要写「如果你有这些表现，说明你正处于严重的精神内耗」；分享梨形身材穿搭，先说「腿粗胯宽屁股大，穿啥都不好看」，梨形身材的人自然对号入座。\n\n先告诉观众你在解决她的什么苦恼，你就拥有了更多的潜在受众。',
   xhs:'【为什么你的干货没人看？因为你搞错了第一句话】\n\n同样是知识博主，为什么点赞收藏差几千倍？\n\n原因只有一个：你没有在开头写出观众的苦恼。\n\n❌「今天教大家如何冥想」——只抓住了想学冥想的人\n✅「每天冥想3分钟，我逆生长了10岁」——抓住了所有人\n\n分享心理学：\n❌「三招摆脱情绪内耗」\n✅「如果你有这些表现，说明你正处于严重的精神内耗」\n\n分享穿搭：\n❌「梨形身材显瘦穿搭」\n✅「腿粗胯宽屁股大，穿啥都不好看——直到我发现这个」\n\n规律很简单：先说她的苦恼，再给你的方案。潜在受众一下子扩大十倍。\n\n#小红书运营 #内容创作 #涨粉技巧 #文案写作 #自媒体'},
  {title:'不要再对标别人了',tag:'人设IP',
   pyq:'不要再对标董太太、万相凡清、Olga姐姐了。\n\n在模仿借鉴之前，先问自己一个问题：这个IP身上的流量，到底取决于什么？\n\n你以为大家关注万相凡清，是因为她讲的女性成长知识特别有用吗？她的流量80%取决于人设——外形姣好、离异带娃、独立女性、姐弟恋，几乎所有女性最爱的标签都被她占了。哪怕把她的逐字稿喂给你，用一模一样的语气语速去说，你也无法实现同样的化学反应。\n\n做个人IP，本就无法复制。',
   xhs:'【学了她的所有方法，为什么还是做不成她？】\n\n你有没有认真研究过某个博主，把她的选题框架、文案结构、拍摄风格全部学了个遍——然后发现，完全没用？\n\n不是你学艺不精，是你搞错了她流量的来源。\n\n以万相凡清为例。她的流量80%来自人设——外形姣好、离异带娃、独立女性、姐弟恋，几乎占满了女性受众最爱的所有维度。哪怕你把她的逐字稿一字不差地背出来，也产生不了同样的化学反应。\n\n做个人IP，本质上无法复制。\n\n你真正应该做的，是先搞清楚自己身上有什么别人替代不了的东西。\n\n#个人IP #自媒体 #内容创作 #账号定位 #涨粉'},
  {title:'人设即灵魂',tag:'人设IP',
   pyq:'没有灵魂的内容无法真正走进观众心里——像AI一般，说着相似的话，坐在相似的背景前，区别只是脸不一样。\n\n内容的灵魂是什么？人设即灵魂。\n\n但人设不仅仅是你具备什么技能，而是在看似同样的领域，你有什么独特的思考、经验和价值主张。更重要的是：不要「做」人设，因为人设总会崩塌。真正的人设，就是你最真实的本我。\n\n你需要先接受自己的人设，就像接受自己未化妆的容颜那样。当你的内容里有了你，也就有了魂。',
   xhs:'【为什么你的内容看起来像AI写的？】\n\n现在有一种博主越来越多：坐在精心布置的背景前，说着正确的话，拍着规范的画面——但就是让人记不住。\n\n这不是技术问题，是灵魂问题。\n\n人设不是你擅长什么技能，而是在同一个领域里，你有什么别人替代不了的思考和经历。\n\n更重要的是：不要去「做」人设。因为做出来的人设总会崩塌，粉丝捧得有多高，塌的时候就摔得有多惨。\n\n真正的人设，就是你最真实的本我。当内容里有了你，也就有了魂。\n\n#个人IP #内容创作 #自媒体 #账号定位 #人设'},
  {title:'优秀的真相',tag:'心理哲学',
   pyq:'「优秀」这个词，是别人对你的评价——因为你展现了人们想要看的样子，或者提供了别人想要的价值。\n\n唯独不是给自己看的。',
   xhs:'【「优秀」这个词，其实跟你自己没什么关系】\n\n我们从小被教着要变得优秀，却很少有人问过：优秀，是为谁而存在的？\n\n答案很简单：优秀是别人对你的评价。因为你展现了他们想看到的样子，提供了他们需要的价值。\n\n它唯独不是给你自己看的。\n\n当你开始为「让别人觉得你优秀」而活，你其实已经把自己的坐标系交出去了。\n\n真正值得追求的，是做让自己感到有意义的事——哪怕没人看见，哪怕没人鼓掌。\n\n#人生哲学 #个人成长 #内心自由 #女性成长 #思维方式'},
  {title:'忠心的价格',tag:'心理哲学',
   pyq:'忠心，是有价格的。\n\n下属对领导的忠心，将军对君王的忠心，女人对男人的忠心，都有价格。当你的出价高到对方在全世界找不到第二个，你就得到了他的忠心。\n\n至于对方是否真的认同你、真的爱你？这重要吗？只要你的出价他在全世界再也找不到第二个，他也会假装认同你，假装爱你，并且，真实地对你忠心。',
   xhs:'【忠心是有价格的——这个真相没人愿意说】\n\n我们喜欢相信忠诚是发自内心的，是无条件的，是高尚情感的产物。\n\n但仔细想想：下属对领导的忠心、将军对君王的忠心、伴侣之间的忠心——哪一种背后没有价格？\n\n当你的出价高到对方在全世界找不到第二个，你就得到了他真实的忠心——哪怕他并不真正认同你，哪怕他只是在演。\n\n这听起来很冷，但反过来想也是一种解脱：你不需要让所有人真心爱你，你只需要成为他们最好的选择。\n\n这是关系的本质，也是商业的本质。\n\n#人际关系 #底层逻辑 #女性成长 #思维认知 #人生哲学'},
  {title:'觉醒不是逃离因果',tag:'心理哲学',
   pyq:'我们常说「打破因果」，但这个表述本身就是一个误解。\n\n龙树菩萨说：正因为空，因果才能成立。若万物实有、固定不变，因果反而无法运转。所以空性不是「因果消失」，而是因果失去了实有的自性。\n\n更准确的说法是——觉醒不是打破因果，而是不再被因果所困。\n\n就像水流依然存在，但你不再是水中的木头，而成了看见水流的岸。',
   xhs:'【开悟了就没有因果了？这是最大的误解】\n\n很多人学了点玄学或佛法之后，开始相信「只要意识足够高，就能打破因果」。\n\n这个想法本身，就是一种执着。\n\n龙树菩萨说得很清楚：正因为空，因果才能成立。空性不是因果的消失，而是因果失去了「实有」的自性。\n\n不是打破因果，而是不再被因果所困。\n\n普通意识：被业力拖着走，不由自主。\n觉知提升后：看见因果的生起，但不认同、不抓取。\n真正高维的状态：因果依然在显现，但观察者已经不在轨道上制造新的执取了。\n\n水流还在，但你不再是水里漂着的木头——你成了看见水流的岸。\n\n#东方哲学 #佛法 #空性 #因果 #意识成长'},
  {title:'AI越强，真实人越值钱',tag:'自媒体趋势',
   pyq:'AI的内容生产能力越来越强，这件事带来了一个反直觉的结果：真实的、有血肉的、会犯错的普通人，正在变得越来越稀缺。\n\n当所有人都能用AI生成流畅的干货、精准的选题、无懈可击的逻辑，差异化就只剩下一件事：你这个人。\n\n你经历过什么，你怎么思考，你在某件事上的真实困惑和真实判断——这些AI没有，因为它没有活过。\n\n所以这个时代最反常识的结论是：内容越容易生产，「内容里有你」就越值钱。',
   xhs:'【AI越厉害，有「人味」的内容反而越值钱】\n\n一个反直觉的趋势正在发生：AI的内容生产能力越强，真实的普通人反而越稀缺。\n\n当所有人都能用AI生成流畅干货、完美逻辑、精准选题——内容同质化会到一个前所未有的程度。\n\n这时候差异化只剩下一件事：你这个人。\n\n你经历过什么，你在某件事上真实的困惑，你会犯什么错、又怎么面对——这些AI没有，因为它没有活过。\n\n最反常识的结论：内容越容易生产，「内容里有你」就越值钱。\n\n现在的问题不是你会不会用AI，而是你还剩多少是你自己的。\n\n#AI时代 #内容创作 #个人IP #自媒体趋势 #差异化'},
  {title:'坚持的本质是扩大截面',tag:'内容创作',
   pyq:'很多人对坚持有一个误解，觉得坚持就是咬牙撑着，熬过对手，等风口来临。\n\n但坚持真正在做的事，是扩大你的截面积。\n\n把一个领域想象成一片海。运气事件——对的人、对的机会、对的时机——每天都在这片海里随机游动。你在海里的时间越长，网铺得越开，捞到的概率就越大。大多数人不是输给了竞争者，而是在鱼游过来之前，自己先上岸了。\n\nTaleb说某些领域的回报是极度不对称的——大多数时间没有任何回报，但一次命中可以覆盖所有成本。持续在场的意义就在于：你不知道哪一次是那个命中，但你知道退场之后一定不会是你。',
   xhs:'【坚持不是在熬，是在扩大你被运气命中的截面积】\n\n我们被教育说坚持就是咬牙撑着，熬过对手，熬到风口来临。\n\n这个理解没错，但只说了坚持最表面的价值。更深的那一层是这样的——\n\n把你的领域想象成一片海。机会、对的人、对的时机，每天都在这片海里随机游动。你撒网的时间越长，网铺得越开，被命中的概率就越大。\n\n大多数人不是输给了竞争者，而是在鱼游过来之前，自己先上岸了。\n\nTaleb说得很直接：创作、创业这类领域，回报是极度不对称的。大多数时间没有任何回报，但一次命中可以覆盖所有成本。\n\n持续在场的意义只有一个：你不知道哪次是那个命中，但你知道退场之后一定不会是你。\n\n#自媒体 #坚持 #内容创作 #底层逻辑 #运气'},
  {title:'中国自媒体的三个阶段',tag:'自媒体趋势',
   pyq:'做了七年自媒体，我把这个行业的变化大概分成三个阶段。\n\n第一阶段是野蛮生长期：谁胆子大、执行力强，谁就能快速赚到钱。内容是粗糙的，变现是直接的，规则是混乱的。\n\n第二阶段是平台收割期：流量越来越贵，算法越来越难懂，入局门槛越来越高，大量普通人在这个阶段被淘汰出局。\n\n现在我们进入了第三阶段：精细化竞争期。技术的门槛已经被AI拉平，剩下真正有壁垒的只有两件事——独特的认知，和真实的人格。\n\n这也是为什么，现在做内容，心比技术更重要。',
   xhs:'【做了7年自媒体，我把这个行业分成了三个阶段】\n\n第一阶段：野蛮生长期\n谁胆子大、执行力强，谁就能快速赚到钱。内容粗糙，变现直接，规则混乱——但机会极多，普通人翻身的故事每天都在发生。\n\n第二阶段：平台收割期\n流量越来越贵，算法越来越难懂。大量普通创作者被淘汰，只有有资源、有团队的人留下来。\n\n第三阶段：精细化竞争期（现在）\nAI把所有技术门槛都拉平了。真正有壁垒的只剩两件事：独特的认知，和真实的人格。\n\n所以现在做内容，心比技术更重要。你的经历、你的判断、你的价值观——这些是AI给不了的。\n\n你现在在第几阶段？\n\n#自媒体 #内容创作 #行业趋势 #个人IP #AI时代'},
  {title:'时间窗口与淡然离场',tag:'变现思维',
   pyq:'对于普通人来说，没有绝对的好赛道，只有有意或无意踩中的行业时间窗口。\n\n窗口期一般只有3-6个月，之后会有大量更不要脸、更卖命的人卷进来。\n\n普通人能做的：在这个窗口期疯狂赚完这笔钱，同时拿出一部分构建自己的行业壁垒。当饿狼都闻味儿卷进来的时候，你，淡然离场。\n\n再用大部分时间去瞄准，等待下一个时机。\n\n猎人不守在一棵树下，他在森林里走动。',
   xhs:'【普通人赚钱的正确姿势：踩窗口，建壁垒，淡然离场】\n\n没有什么绝对的好赛道，只有踩中或没踩中时间窗口的区别。\n\n窗口期一般只有3-6个月。之后会有大量更不要脸、更卖命的人冲进来。\n\n普通人能做的，其实只有三步：\n\n第一步：发现窗口，立刻冲进去。不要等准备好了再开始，窗口等不了你。\n\n第二步：窗口期内疯狂赚钱的同时，拿出一部分构建你的壁垒。壁垒可以是品牌、是关系、是口碑——但不能是「我进来得早」。\n\n第三步：当饿狼都闻味儿卷进来的时候，你，淡然离场。\n\n猎人不守在一棵树下，他在森林里走动。\n\n#商业思维 #变现 #自媒体 #赛道选择 #底层逻辑'},
  {title:'信息源决定认知天花板',tag:'心理哲学',
   pyq:'你的认知天花板，是由你的信息源决定的。\n\n不是你看了多少，而是你从哪里看、跟谁在一起、被什么滋养。\n\n在低质量的信息环境里待久了，你会不知不觉地用低质量的方式思考——甚至开始觉得那是正常的。\n\n这些年我一直在做的一件事是：清理信息源。退出无意义的群组，停止刷充满焦虑情绪的账号，主动选择让自己变得更清醒的输入。\n\n输入的质量，决定输出的质量。人也一样。',
   xhs:'【你的认知天花板，是被你的信息源封住的】\n\n有没有发现，有些人聊天特别有意思，有些人只会重复网上的烂梗和焦虑情绪？\n\n区别不在于智商，在于信息源。\n\n你每天接收什么，你就慢慢变成什么。在低质量信息环境里待久了，不是你开始变傻，是你开始觉得那种思维方式是正常的。\n\n这些年我一直在做的一件事：主动清理信息源。\n\n退出充斥焦虑和抱怨的群组\n取关只会贩卖恐慌的账号\n减少刷没有营养的短视频的时间\n主动选择让自己变得更清醒的内容\n\n输入的质量，决定输出的质量。这不只是内容创作的规律，这是人生的规律。\n\n你上一次主动清理信息源是什么时候？\n\n#个人成长 #认知升级 #信息管理 #自媒体 #思维方式'},
  {title:'做IP，心比技术更重要',tag:'变现思维',
   pyq:'做IP最大的壁垒，不是选题、不是文案、不是拍摄、不是剪辑。\n\n《与神对话》的作者说，这本书不是他自己写的，而是某种力量借由他的手写出来。李安说过类似的话。\n\n做IP要做到有灵性——你倾注了心、注意力、此时此刻，做出的东西才能打动人心。每发一条视频脑子里都是「这条能回本多少」，内容一定是庸俗的。\n\n我做知识付费从不担心「教会徒弟饿死师傅」。因为有人生阅历的差别，有审美的差别，有心的差别。你过去经历的事、看过的书、你的父母、你接受的信息源……这些早已融进血液，是别人抄不走的部分，也是一个IP真正的壁垒。',
   xhs:'【做IP最大的壁垒，是一个玄之又玄的东西】\n\n很多人以为做IP就是搞定选题、文案、拍摄、剪辑。\n\n这些都是术。\n\n《与神对话》的作者说，这本书不是他写的，是某种力量借由他的手写出来的。李安也说过类似的话。你倾注了心、注意力、此时此刻，做出的东西才能真正打动人。\n\n每发一条视频脑子里都是「这条能回本多少」，那内容一定是庸俗的。\n\n我做知识付费从不担心「教会徒弟饿死师傅」。因为有人生阅历的差别，有审美的差别，有心的差别——这些已经融进了你的血液，是别人抄不走的部分。\n\n这才是一个IP真正的壁垒。\n\n#个人IP #内容创作 #知识付费 #自媒体 #底层逻辑'}
];

let mode='pyq', activeTag='全部', entries=[], expanded={};

async function init(){
  renderTags();
  try{
    const {data,error}=await sb.from('copywriting').select('*').order('id',{ascending:true});
    if(error) throw error;
    if(data.length===0){
      await seedData();
    } else {
      entries=data;
      render();
    }
  } catch(e){
    showError('数据库连接失败，请检查网络。'+e.message);
  }
}

async function seedData(){
  try{
    const {data,error}=await sb.from('copywriting').insert(SEED).select();
    if(error) throw error;
    entries=data;
    render();
  } catch(e){
    showError('初始化数据失败：'+e.message);
  }
}

function showError(msg){
  document.getElementById('errorBox').innerHTML=`<div class="error-msg">${msg}</div>`;
  document.getElementById('cardsContainer').innerHTML='';
}

function setMode(m){
  mode=m; expanded={};
  document.getElementById('mpyq').className='mode-btn'+(m==='pyq'?' on':'');
  document.getElementById('mxhs').className='mode-btn'+(m==='xhs'?' on':'');
  render();
}

function setTag(tag){
  activeTag=tag;
  document.querySelectorAll('.tag-chip').forEach(el=>{
    el.className='tag-chip'+(el.dataset.tag===tag?' on':'');
  });
  render();
}

function toggleExpand(id){
  expanded[id]=!expanded[id];
  const entry=entries.find(e=>e.id===id);
  if(!entry) return;
  const text=mode==='pyq'?entry.pyq:(entry.xhs||entry.pyq);
  const el=document.getElementById('ct-'+id);
  const btn=document.getElementById('eb-'+id);
  if(el) el.textContent=expanded[id]?text:(text.length>160?text.substring(0,160)+'…':text);
  if(btn) btn.textContent=expanded[id]?'收起':'展开全文';
}

function copyText(id){
  const entry=entries.find(e=>e.id===id);
  if(!entry) return;
  const text=mode==='pyq'?entry.pyq:(entry.xhs||entry.pyq);
  const btn=document.getElementById('cb-'+id);
  const done=()=>{
    if(btn){
      btn.textContent='已复制 ✓';
      btn.className='copy-btn copied';
      setTimeout(()=>{btn.textContent='复制';btn.className='copy-btn';},2500);
    }
  };
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(done).catch(()=>fbCopy(text,done));
  } else { fbCopy(text,done); }
}

function fbCopy(text,cb){
  const ta=document.createElement('textarea');
  ta.value=text;
  ta.style.cssText='position:fixed;opacity:0;top:0;left:0;width:1px;height:1px';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try{document.execCommand('copy');cb();}catch(e){}
  document.body.removeChild(ta);
}

function openSheet(editId){
  if(editId){
    const entry=entries.find(e=>e.id===editId);
    if(!entry) return;
    document.getElementById('sheetTitle').textContent='编辑文案';
    document.getElementById('editId').value=editId;
    document.getElementById('inTitle').value=entry.title;
    document.getElementById('inTag').value=entry.tag;
    document.getElementById('inPyq').value=entry.pyq;
    document.getElementById('inXhs').value=entry.xhs||'';
  } else {
    document.getElementById('sheetTitle').textContent='添加文案';
    document.getElementById('editId').value='';
    document.getElementById('inTitle').value='';
    document.getElementById('inPyq').value='';
    document.getElementById('inXhs').value='';
  }
  document.getElementById('overlay').className='overlay open';
  document.body.style.overflow='hidden';
}

function closeSheet(){
  document.getElementById('overlay').className='overlay';
  document.body.style.overflow='';
}

function handleOverlay(e){
  if(e.target===document.getElementById('overlay')) closeSheet();
}

async function saveEntry(){
  const title=document.getElementById('inTitle').value.trim();
  const tag=document.getElementById('inTag').value;
  const pyq=document.getElementById('inPyq').value.trim();
  const xhs=document.getElementById('inXhs').value.trim();
  const editId=document.getElementById('editId').value;
  if(!title||!pyq){alert('请填写标题和朋友圈文案');return;}
  const saveBtn=document.querySelector('.save-btn');
  saveBtn.textContent='保存中...'; saveBtn.disabled=true;
  try{
    if(editId){
      const {data,error}=await sb.from('copywriting')
        .update({title,tag,pyq,xhs:xhs||pyq})
        .eq('id',parseInt(editId)).select();
      if(error) throw error;
      const idx=entries.findIndex(e=>e.id===parseInt(editId));
      if(idx>-1) entries[idx]=data[0];
    } else {
      const {data,error}=await sb.from('copywriting')
        .insert({title,tag,pyq,xhs:xhs||pyq}).select();
      if(error) throw error;
      entries.push(data[0]);
    }
    closeSheet();
    render();
  } catch(e){
    alert('保存失败：'+e.message);
  } finally {
    saveBtn.textContent='保存'; saveBtn.disabled=false;
  }
}

async function deleteEntry(id){
  if(!confirm('确认删除这条文案？')) return;
  try{
    const {error}=await sb.from('copywriting').delete().eq('id',id);
    if(error) throw error;
    entries=entries.filter(e=>e.id!==id);
    render();
  } catch(e){
    alert('删除失败：'+e.message);
  }
}

function renderTags(){
  document.getElementById('tagsRow').innerHTML=TAGS.map(t=>
    `<button class="tag-chip${t===activeTag?' on':''}" data-tag="${t}" onclick="setTag('${t}')">${t}</button>`
  ).join('');
}

function render(){
  const filtered=entries.filter(e=>activeTag==='全部'||e.tag===activeTag);
  document.getElementById('countLabel').textContent=filtered.length+' 条';
  if(filtered.length===0){
    document.getElementById('cardsContainer').innerHTML=
      '<div class="empty">这个分类暂时没有文案<br>点右上角「+ 添加」录入</div>';
    return;
  }
  document.getElementById('cardsContainer').innerHTML=filtered.map(e=>{
    const text=mode==='pyq'?e.pyq:(e.xhs||e.pyq);
    const preview=expanded[e.id]?text:(text.length>160?text.substring(0,160)+'…':text);
    const canExp=text.length>160;
    return `<div class="card">
      <div class="card-top">
        <div class="card-meta">
          <span class="card-tag">${e.tag}</span>
          <div class="card-title">${e.title}</div>
        </div>
        <button class="copy-btn" id="cb-${e.id}" onclick="copyText(${e.id})">复制</button>
      </div>
      <div class="card-content" id="ct-${e.id}">${preview}</div>
      ${canExp?`<button class="expand-btn" id="eb-${e.id}" onclick="toggleExpand(${e.id})">${expanded[e.id]?'收起':'展开全文'}</button>`:''}
      <div class="card-actions">
        <button class="action-btn" onclick="openSheet(${e.id})">编辑</button>
        <button class="action-btn del" onclick="deleteEntry(${e.id})">删除</button>
      </div>
    </div>`;
  }).join('');
}

init();
</script>
