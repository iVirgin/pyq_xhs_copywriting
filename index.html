<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="文案库">
<title>Nova 文案库</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC','Hiragino Sans GB',sans-serif;background:#f5f4f0;color:#1a1a1a;font-size:15px;min-height:100vh}
.header{position:sticky;top:0;z-index:100;background:rgba(245,244,240,0.96);backdrop-filter:blur(12px);padding:14px 16px 10px;border-bottom:0.5px solid #e0e0d8}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.header-title{font-size:18px;font-weight:600;letter-spacing:0.02em}
.add-btn-top{padding:7px 18px;border-radius:20px;background:#1a1a1a;color:#f5f4f0;border:none;font-size:13px;cursor:pointer;font-family:inherit}
.mode-toggle{display:flex;gap:6px;margin-bottom:10px}
.mode-btn{flex:1;padding:9px;border-radius:10px;border:0.5px solid #ccc;background:#ebebeb;color:#666;font-size:14px;cursor:pointer;font-family:inherit;transition:all 0.15s}
.mode-btn.on{background:#fff;color:#1a1a1a;font-weight:500;border-color:#bbb;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.tags-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.tags-row::-webkit-scrollbar{display:none}
.tag-chip{padding:5px 14px;border-radius:20px;border:0.5px solid #d0d0d0;background:#ebebeb;color:#666;font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all 0.15s}
.tag-chip.on{background:#1a1a1a;color:#f5f4f0;border-color:transparent}
.main{padding:14px 16px 100px}
.count-label{font-size:12px;color:#999;margin-bottom:12px;letter-spacing:0.03em;display:flex;justify-content:space-between;align-items:center}
.sync-btn{font-size:12px;color:#999;background:none;border:none;cursor:pointer;font-family:inherit;padding:0}
.card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;border:0.5px solid #e8e8e8}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.card-meta{flex:1;min-width:0}
.card-tag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;background:#f0efeb;color:#888}
.card-title{font-size:15px;font-weight:500;margin:6px 0 0;color:#1a1a1a;line-height:1.4}
.copy-btn{margin-left:12px;flex-shrink:0;padding:7px 16px;border-radius:10px;border:0.5px solid #ccc;background:transparent;color:#555;font-size:13px;cursor:pointer;font-family:inherit;transition:all 0.15s}
.copy-btn.copied{color:#2d7a4f;border-color:#2d7a4f;background:#edf7f1}
.card-content{font-size:14px;color:#444;line-height:1.8;white-space:pre-wrap;word-break:break-word}
.expand-btn{background:none;border:none;padding:0;font-size:12px;color:#999;cursor:pointer;text-decoration:underline;margin-top:8px;display:block;font-family:inherit}
.card-actions{display:flex;gap:14px;margin-top:10px;padding-top:10px;border-top:0.5px solid #f0f0ee}
.action-btn{background:none;border:none;padding:0;font-size:12px;color:#aaa;cursor:pointer;font-family:inherit}
.action-btn.del{color:#e06060}
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:200}
.overlay.open{display:block}
.sheet{position:absolute;bottom:0;left:0;right:0;background:#f5f4f0;border-radius:20px 20px 0 0;padding:20px 16px 44px;max-height:92vh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;background:#ccc;border-radius:2px;margin:0 auto 16px}
.sheet h3{font-size:16px;font-weight:600;margin-bottom:16px;text-align:center;color:#1a1a1a}
.field-label{font-size:13px;color:#666;margin:0 0 6px;display:block}
input[type=text],select,textarea{width:100%;padding:10px 12px;border-radius:10px;border:0.5px solid #ccc;background:#fff;color:#1a1a1a;font-size:14px;font-family:inherit;outline:none;-webkit-appearance:none;margin-bottom:14px}
input[type=text]:focus,textarea:focus{border-color:#999}
textarea{resize:vertical;line-height:1.6}
.sheet-actions{display:flex;gap:8px;margin-top:4px}
.save-btn{flex:1;padding:13px;border-radius:12px;border:none;background:#1a1a1a;color:#fff;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit}
.cancel-btn{padding:13px 20px;border-radius:12px;border:0.5px solid #ccc;background:transparent;color:#666;font-size:15px;cursor:pointer;font-family:inherit}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.loading{text-align:center;padding:60px 16px;color:#aaa;font-size:14px}
.loading-spinner{width:24px;height:24px;border:2px solid #e0e0d8;border-top-color:#888;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 16px;color:#bbb;font-size:14px;line-height:1.8}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <span class="header-title">文案库</span>
    <button class="add-btn-top" onclick="openSheet()">+ 添加</button>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn on" id="mpyq" onclick="setMode('pyq')">朋友圈</button>
    <button class="mode-btn" id="mxhs" onclick="setMode('xhs')">小红书图文</button>
  </div>
  <div class="tags-row" id="tagsRow"></div>
</div>
<div class="main">
  <div class="count-label">
    <span id="countLabel"></span>
    <button class="sync-btn" onclick="loadData()">↻ 刷新</button>
  </div>
  <div id="cardsContainer"><div class="loading"><div class="loading-spinner"></div>加载中...</div></div>
</div>
<div class="overlay" id="overlay" onclick="handleOverlay(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3 id="sheetTitle">添加文案</h3>
    <input type="hidden" id="editId">
    <span class="field-label">标题</span>
    <input type="text" id="inTitle" placeholder="文案主题">
    <span class="field-label">分类</span>
    <select id="inTag">
      <option>AI与人</option><option>内容创作</option><option>创业思考</option><option>哲学玄学</option><option>卖点宣发</option>
    </select>
    <span class="field-label">朋友圈版本</span>
    <textarea id="inPyq" rows="6" placeholder="粘贴朋友圈文案..."></textarea>
    <span class="field-label">小红书版本（可选）</span>
    <textarea id="inXhs" rows="5" placeholder="含【标题】和 #话题标签，留空则用朋友圈版本"></textarea>
    <div class="sheet-actions">
      <button class="save-btn" id="saveBtn" onclick="saveEntry()">保存</button>
      <button class="cancel-btn" onclick="closeSheet()">取消</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const OWNER='iVirgin',REPO='pyq_xhs_copywriting',FILE='data.json';
const TOKEN='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';
const RAW=`https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${FILE}`;
const API=`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`;
const TAGS=['全部','AI与人','内容创作','创业思考','哲学玄学','卖点宣发'];
let mode='pyq',activeTag='全部',entries=[],expanded={};

function showToast(msg,dur=2000){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show';
  setTimeout(()=>t.className='toast',dur);
}

async function loadData(){
  document.getElementById('cardsContainer').innerHTML='<div class="loading"><div class="loading-spinner"></div>加载中...</div>';
  try{
    const r=await fetch(RAW+'?t='+Date.now());
    if(!r.ok)throw new Error('读取失败');
    entries=await r.json();render();
  }catch(e){
    document.getElementById('cardsContainer').innerHTML='<div class="empty">加载失败，点右上角刷新重试</div>';
  }
}

async function getFileSHA(){
  const r=await fetch(API,{headers:{Authorization:'Bearer '+TOKEN}});
  if(!r.ok)throw new Error('获取文件信息失败');
  return (await r.json()).sha;
}

async function saveToGitHub(newEntries){
  const sha=await getFileSHA();
  const content=JSON.stringify(newEntries,null,2);
  const encoded=btoa(unescape(encodeURIComponent(content)));
  const r=await fetch(API,{method:'PUT',
    headers:{Authorization:'Bearer '+TOKEN,'Content-Type':'application/json'},
    body:JSON.stringify({message:'update',content:encoded,sha})});
  if(!r.ok){const e=await r.json();throw new Error(e.message||'保存失败');}
}

function setMode(m){
  mode=m;expanded={};
  document.getElementById('mpyq').className='mode-btn'+(m==='pyq'?' on':'');
  document.getElementById('mxhs').className='mode-btn'+(m==='xhs'?' on':'');
  render();
}

function setTag(tag){
  activeTag=tag;
  document.querySelectorAll('.tag-chip').forEach(el=>el.className='tag-chip'+(el.dataset.tag===tag?' on':''));
  render();
}

function toggleExpand(id){
  expanded[id]=!expanded[id];
  const e=entries.find(x=>x.id===id);if(!e)return;
  const text=mode==='pyq'?e.pyq:(e.xhs||e.pyq);
  const el=document.getElementById('ct-'+id),btn=document.getElementById('eb-'+id);
  if(el)el.textContent=expanded[id]?text:(text.length>160?text.substring(0,160)+'…':text);
  if(btn)btn.textContent=expanded[id]?'收起':'展开全文';
}

function copyText(id){
  const e=entries.find(x=>x.id===id);if(!e)return;
  const text=mode==='pyq'?e.pyq:(e.xhs||e.pyq);
  const btn=document.getElementById('cb-'+id);
  const done=()=>{
    if(btn){btn.textContent='已复制 ✓';btn.className='copy-btn copied';
    setTimeout(()=>{btn.textContent='复制';btn.className='copy-btn';},2500);}
    showToast('已复制，去粘贴发布吧 ✓');
  };
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(done).catch(()=>fbCopy(text,done));}
  else fbCopy(text,done);
}

function fbCopy(text,cb){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.cssText='position:fixed;opacity:0;top:0;left:0;width:1px;height:1px';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');cb();}catch(e){}
  document.body.removeChild(ta);
}

function openSheet(editId){
  if(editId){
    const e=entries.find(x=>x.id===editId);if(!e)return;
    document.getElementById('sheetTitle').textContent='编辑文案';
    document.getElementById('editId').value=editId;
    document.getElementById('inTitle').value=e.title;
    document.getElementById('inTag').value=e.tag;
    document.getElementById('inPyq').value=e.pyq;
    document.getElementById('inXhs').value=e.xhs||'';
  }else{
    document.getElementById('sheetTitle').textContent='添加文案';
    ['editId','inTitle','inPyq','inXhs'].forEach(id=>document.getElementById(id).value='');
  }
  document.getElementById('overlay').className='overlay open';
  document.body.style.overflow='hidden';
}

function closeSheet(){
  document.getElementById('overlay').className='overlay';
  document.body.style.overflow='';
}

function handleOverlay(e){if(e.target===document.getElementById('overlay'))closeSheet();}

async function saveEntry(){
  const title=document.getElementById('inTitle').value.trim();
  const tag=document.getElementById('inTag').value;
  const pyq=document.getElementById('inPyq').value.trim();
  const xhs=document.getElementById('inXhs').value.trim();
  const editId=document.getElementById('editId').value;
  if(!title||!pyq){showToast('请填写标题和朋友圈文案');return;}
  const btn=document.getElementById('saveBtn');
  btn.textContent='保存中...';btn.disabled=true;
  try{
    let newEntries;
    if(editId){
      newEntries=entries.map(e=>e.id===parseInt(editId)?{...e,title,tag,pyq,xhs:xhs||pyq}:e);
    }else{
      const newId=Math.max(0,...entries.map(e=>e.id))+1;
      newEntries=[...entries,{id:newId,title,tag,pyq,xhs:xhs||pyq}];
    }
    await saveToGitHub(newEntries);
    entries=newEntries;closeSheet();render();
    showToast(editId?'已更新 ✓':'已添加 ✓');
  }catch(e){
    showToast('保存失败：'+e.message,3000);
  }finally{
    btn.textContent='保存';btn.disabled=false;
  }
}

async function deleteEntry(id){
  if(!confirm('确认删除这条文案？'))return;
  const btn=document.getElementById('del-'+id);
  if(btn){btn.textContent='删除中...';btn.disabled=true;}
  try{
    const newEntries=entries.filter(e=>e.id!==id);
    await saveToGitHub(newEntries);
    entries=newEntries;render();showToast('已删除');
  }catch(e){
    showToast('删除失败：'+e.message,3000);
    if(btn){btn.textContent='删除';btn.disabled=false;}
  }
}

function renderTags(){
  document.getElementById('tagsRow').innerHTML=TAGS.map(t=>
    `<button class="tag-chip${t===activeTag?' on':''}" data-tag="${t}" onclick="setTag('${t}')">${t}</button>`
  ).join('');
}

function render(){
  const filtered=entries.filter(e=>activeTag==='全部'||e.tag===activeTag);
  document.getElementById('countLabel').textContent=filtered.length+' 条';
  if(filtered.length===0){
    document.getElementById('cardsContainer').innerHTML='<div class="empty">这个分类暂时没有文案<br>点右上角「+ 添加」录入</div>';
    return;
  }
  document.getElementById('cardsContainer').innerHTML=filtered.map(e=>{
    const text=mode==='pyq'?e.pyq:(e.xhs||e.pyq);
    const preview=expanded[e.id]?text:(text.length>160?text.substring(0,160)+'…':text);
    const canExp=text.length>160;
    return `<div class="card">
      <div class="card-top">
        <div class="card-meta"><span class="card-tag">${e.tag}</span><div class="card-title">${e.title}</div></div>
        <button class="copy-btn" id="cb-${e.id}" onclick="copyText(${e.id})">复制</button>
      </div>
      <div class="card-content" id="ct-${e.id}">${preview}</div>
      ${canExp?`<button class="expand-btn" id="eb-${e.id}" onclick="toggleExpand(${e.id})">${expanded[e.id]?'收起':'展开全文'}</button>`:''}
      <div class="card-actions">
        <button class="action-btn" onclick="openSheet(${e.id})">编辑</button>
        <button class="action-btn del" id="del-${e.id}" onclick="deleteEntry(${e.id})">删除</button>
      </div>
    </div>`;
  }).join('');
}

renderTags();loadData();
</script>
</body>
</html>
